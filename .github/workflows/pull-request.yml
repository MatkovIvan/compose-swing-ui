name: Pull Request

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pull-request-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: Validation
    uses: ./.github/workflows/validation.yml
    permissions:
      contents: read
      checks: write
    secrets: inherit
