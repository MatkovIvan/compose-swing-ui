name: Validation

on:
  workflow_call:

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v6
        name: Checkout Repository

      - uses: ./.github/actions/setup-prerequisites
        name: Setup Prerequisites
        with:
          java-version: 21

      # A virtual framebuffer gives the headless runner a display so tests that realize a real
      # top-level window run instead of skipping. Gradle is launched under xvfb-run below.
      - shell: bash
        name: Install Virtual Framebuffer
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # buildSrc is an included build, so the root gates below do not reach it. Run its
      # ktlint/detekt explicitly first so a convention-plugin regression fails fast.
      - shell: bash
        name: Verify Build Logic
        run: |
          ./gradlew --no-daemon --stacktrace --continue \
            :buildSrc:ktlintCheck :buildSrc:detekt

      # `build` runs `check` for every module (compile, ktlintCheck, detekt, the Android Lint
      # Compose checks, test, and swing-ui's jacocoTestCoverageVerification) plus `assemble`.
      # Driving it generically gates new modules automatically without enumerating them.
      # `checkKotlinAbi` validates the committed api/*.api dumps and is not part of `check`, so it
      # is requested explicitly. `--continue` reports every failure in a single run. Run under
      # xvfb-run so window tests have a display and exercise real top-level peers.
      - shell: bash
        name: Build & Run Gates
        run: |
          xvfb-run --auto-servernum ./gradlew --no-daemon --stacktrace --continue \
            build checkKotlinAbi

      # Sanity-check that the publishing configuration resolves and produces artifacts.
      - shell: bash
        name: Publish Dry Run
        run: |
          ./gradlew --no-daemon --stacktrace \
            publishToMavenLocal

      - uses: ./.github/actions/upload-test-report
        name: Upload Test Report
        if: always()
        with:
          artifact-name: tests-results-unit
          upload-artifact: ${{ job.status == 'failure' }}
