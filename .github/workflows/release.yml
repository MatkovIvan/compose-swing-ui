name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in strict X.Y.Z format"
        required: true
        type: string
      suffix:
        description: "Optional pre-release suffix (for example alpha.1, beta.2, rc.1)"
        required: false
        type: string

jobs:
  validation:
    name: Validation
    uses: ./.github/workflows/validation.yml
    permissions:
      contents: read
      checks: write
    secrets: inherit

  publish-release:
    name: Publish Release and Create GitHub Release
    needs: [validation]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write

    steps:
      - shell: bash
        name: Validate Version Input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid version: $VERSION" >&2; exit 1; }

      - uses: actions/checkout@v6
        name: Checkout Repository

      - uses: ./.github/actions/setup-prerequisites
        name: Setup Prerequisites
        with:
          java-version: 21

      - shell: bash
        name: Publish Release Artifacts
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          SUFFIX: ${{ inputs.suffix }}
        run: |
          ./gradlew --no-daemon --stacktrace publish -Pversion="$VERSION" -PversionSuffix="$SUFFIX"

      - shell: bash
        name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          SUFFIX: ${{ inputs.suffix }}
        run: |
          if [[ -n "$SUFFIX" ]]; then TAG="v$VERSION-$SUFFIX"; else TAG="v$VERSION"; fi
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
